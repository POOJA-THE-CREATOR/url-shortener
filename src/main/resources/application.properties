spring.application.name=url-shortener

# Postgres
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/urlshortener}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=20

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.cache.type=redis

# App
app.base-url=${BASE_URL:http://localhost:8080}
server.port=${PORT:8080}

# Actuator (Cloud Run health checks hit /actuator/health)
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
